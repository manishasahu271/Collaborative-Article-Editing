server:
  port: 9191

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://*.vercel.app"
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600
      discovery:
        locator:
          enabled: true
      routes:
        - id: ARTICLE-SERVICE
          uri: lb://ARTICLE-SERVICE
          predicates:
            - Path=/api/article/**
          filters:
          - AuthenticationFilter

        - id: VERSION-TRACKING-SERVICE
          uri: lb://VERSION-TRACKING-SERVICE
          predicates:
            - Path=/api/version/**
          filters:
            - AuthenticationFilter
        - id: WORKFLOW-SERVICE
          uri: lb://WORKFLOW-SERVICE
          predicates:
            - Path=/workflow/**
          filters:
            - AuthenticationFilter
        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user/**
          filters:
          - AuthenticationFilter
            
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/**
          filters:
          - AuthenticationFilter

